<!DOCTYPE html>
<html>
<head>
    <title>Willy Chess V8.6</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #111; color: #0f0; font-family: monospace; text-align: center; }
        #board { width: 400px; margin: 20px auto; border: 2px solid #333; }
        .stats { margin: 10px; font-size: 1.2em; }
        #status { color: #ff0; font-weight: bold; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #222; color: #0f0; border: 1px solid #0f0; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <h1>WILLY V8.6: WEB EDITION</h1>
    <div id="status">LOADING WILLY'S BRAIN...</div>
    <div class="stats">
        GAMES: <span id="g_count">1</span> | WINS: <span id="w_count">0</span>
    </div>
    
    <div id="board"></div>
    
    <button onclick="resetGame()">RESET 1V1</button>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <script>
        let pyodide;
        let board;

        // 1. Start Python in the Browser
        async function setupWilly() {
            pyodide = await loadPyodide();
            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            await micropip.install("python-chess");
            
            // Inject YOUR EXACT Python Code
            await pyodide.runPythonAsync(`
import chess
import random
import math

class WillyV8:
    def __init__(self):
        self.stats = {"games": 1, "wins": 0}
        self.piece_values = {chess.PAWN: 100, chess.KNIGHT: 310, chess.BISHOP: 335, chess.ROOK: 500, chess.QUEEN: 950, chess.KING: 20000}
        self.book = {"": ["e2e4", "d2d4"], "e2e4": ["c7c5", "e7e5"], "d2d4": ["d7d5"]}

    def evaluate_board(self, board):
        if board.is_checkmate(): return 999999 if board.turn == chess.WHITE else -999999
        score = 0
        for sq, piece in board.piece_map().items():
            val = self.piece_values.get(piece.piece_type, 0)
            score += val if piece.color == chess.BLACK else -val
        return score

    def minimax(self, board, depth, alpha, beta, maximizing):
        if depth == 0 or board.is_game_over(): return self.evaluate_board(board)
        if maximizing:
            v = -math.inf
            for m in board.legal_moves:
                board.push(m); v = max(v, self.minimax(board, depth-1, alpha, beta, False)); board.pop()
                alpha = max(alpha, v)
                if beta <= alpha: break
            return v
        else:
            v = math.inf
            for m in board.legal_moves:
                board.push(m); v = min(v, self.minimax(board, depth-1, alpha, beta, True)); board.pop()
                beta = min(beta, v)
                if beta <= alpha: break
            return v

    def get_move(self, fen):
        board = chess.Board(fen)
        # Opening Book
        history = " ".join([m.uci() for m in board.move_stack])
        if history in self.book: return random.choice(self.book[history])
        
        # Minimax
        best_move, max_v = None, -math.inf
        for m in board.legal_moves:
            board.push(m); v = self.minimax(board, 3, -math.inf, math.inf, False); board.pop()
            if v > max_v: max_v = v; best_move = m
        return best_move.uci() if best_move else list(board.legal_moves)[0].uci()

willy = WillyV8()
            `);
            document.getElementById('status').innerText = "WILLY IS READY. YOUR MOVE.";
            initBoard();
        }

        function initBoard() {
            board = Chessboard('board', {
                draggable: true,
                dropOffBoard: 'snapback',
                position: 'start',
                orientation: 'white',
                onDrop: async function(source, target) {
                    let move = source + target;
                    // Validate move and get Willy's response via Python
                    let result = await pyodide.runPythonAsync(`
import chess
b = chess.Board("${board.fen()}")
move = chess.Move.from_uci("${move}")
if move in b.legal_moves:
    b.push(move)
    if not b.is_game_over():
        willy_move = willy.get_move(b.fen())
        b.push(chess.Move.from_uci(willy_move))
    [b.fen(), "CHECKMATE" if b.is_checkmate() else "LIVE"]
else:
    None
                    `);
                    
                    if (result) {
                        board.position(result[0]);
                        document.getElementById('status').innerText = result[1];
                    } else {
                        return 'snapback';
                    }
                }
            });
        }

        function resetGame() {
            board.start();
            document.getElementById('status').innerText = "YOUR MOVE.";
        }

        setupWilly();
    </script>
</body>
</html>
